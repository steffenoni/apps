<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Apps</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.10);
    --text-primary: #1a1a18;
    --text-secondary: #6b6b66;
    --text-tertiary: #9b9b96;
    --accent: #1D9E75;
    --accent-bg: #E1F5EE;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.10);
      --text-primary: #f0efe9;
      --text-secondary: #a0a09a;
      --text-tertiary: #606060;
      --accent: #5DCAA5;
      --accent-bg: #085041;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .header {
    padding: 56px 24px 32px;
  }

  .header-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .header-title {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text-primary);
  }

  .header-sub {
    font-size: 15px;
    color: var(--text-secondary);
    margin-top: 6px;
    line-height: 1.5;
  }

  .grid {
    padding: 0 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .app-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    text-decoration: none;
    color: inherit;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .app-card:active {
    opacity: 0.7;
  }

  .app-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: var(--accent-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .app-info {
    flex: 1;
    min-width: 0;
  }

  .app-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .app-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 3px;
    line-height: 1.4;
  }

  .app-arrow {
    color: var(--text-tertiary);
    font-size: 18px;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    padding: 0 20px 10px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">My Apps</div>
  <div class="header-title">Home screen tools</div>
  <div class="header-sub">Personal web apps — open in Safari and add to your home screen.</div>
</div>

<div class="grid">

  <div class="section-title">Training</div>

  <a class="app-card" href="human-flag.html">
    <div class="app-icon">🚩</div>
    <div class="app-info">
      <div class="app-name">Human Flag</div>
      <div class="app-desc">Guided training sessions, warm-up, holds, and accessory work.</div>
    </div>
    <div class="app-arrow">›</div>
  </a>

  <!-- Add future apps below this line — copy one <a class="app-card"> block and update the href, icon, name, and description. -->

</div>

</body>
</html>
